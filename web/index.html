<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8조 Infinity - 팀 소개</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<button id="darkModeToggle" class="dark-mode-toggle" aria-label="다크모드 전환">
    <span class="mode-icon">🌙</span>
</button>

<div class="container">
    <header class="team-header">
        <h1 class="team-title">Infinity∞</h1>
        <p class="team-description">무한히 성장하는 팀입니다.</p>
    </header>

    <section class="team-members">
        <div class="leader-row">
            <article class="member-card leader-card" data-member-id="leader" onclick="openModal('leader')">
                <div class="card-content">
                    <div class="member-info">
                        <span class="leader-badge">팀장</span>
                        <h2 class="member-name">로딩 중...</h2>
                        <p class="member-role"></p>
                        <p class="member-intro"></p>
                    </div>
                    <div class="member-image">
                        <img src="" alt="프로필 이미지">
                    </div>
                </div>
            </article>
        </div>

        <div class="members-row">
            <article class="member-card" data-member-id="member1" onclick="openModal('member1')">
                <div class="card-content">
                    <div class="member-info">
                        <h2 class="member-name">로딩 중...</h2>
                        <p class="member-role"></p>
                        <p class="member-intro"></p>
                    </div>
                    <div class="member-image">
                        <img src="" alt="프로필 이미지">
                    </div>
                </div>
            </article>
            <article class="member-card" data-member-id="member2" onclick="openModal('member2')">
                <div class="card-content">
                    <div class="member-info">
                        <h2 class="member-name">로딩 중...</h2>
                        <p class="member-role"></p>
                        <p class="member-intro"></p>
                    </div>
                    <div class="member-image">
                        <img src="" alt="프로필 이미지">
                    </div>
                </div>
            </article>
            <article class="member-card" data-member-id="member3" onclick="openModal('member3')">
                <div class="card-content">
                    <div class="member-info">
                        <h2 class="member-name">로딩 중...</h2>
                        <p class="member-role"></p>
                        <p class="member-intro"></p>
                    </div>
                    <div class="member-image">
                        <img src="" alt="프로필 이미지">
                    </div>
                </div>
            </article>
            <article class="member-card" data-member-id="member4" onclick="openModal('member4')">
                <div class="card-content">
                    <div class="member-info">
                        <h2 class="member-name">로딩 중...</h2>
                        <p class="member-role"></p>
                        <p class="member-intro"></p>
                    </div>
                    <div class="member-image">
                        <img src="" alt="프로필 이미지">
                    </div>
                </div>
            </article>
            <article class="member-card" data-member-id="member5" onclick="openModal('member5')">
                <div class="card-content">
                    <div class="member-info">
                        <h2 class="member-name">로딩 중...</h2>
                        <p class="member-role"></p>
                        <p class="member-intro"></p>
                    </div>
                    <div class="member-image">
                        <img src="" alt="프로필 이미지">
                    </div>
                </div>
            </article>
        </div>
    </section>

    <div id="memberModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-header">
                <img id="modalProfileImage" class="modal-profile-image" src="" alt="프로필 이미지">
                <div class="modal-header-info">
                    <h2 id="modalName" class="modal-name"></h2>
                    <p id="modalSubName" class="modal-subname"></p>
                    <p id="modalQuote" class="modal-quote"></p>
                </div>
            </div>
            <div class="modal-section">
                <h3>소개</h3>
                <p id="modalDetail" class="modal-detail"></p>
            </div>
            <div class="modal-section">
                <h3>기본 정보</h3>
                <ul class="modal-info-list">
                    <li><strong>설명:</strong> <span id="modalDescription"></span></li>
                    <li><strong>생년월일:</strong> <span id="modalBirthday"></span></li>
                    <li><strong>지역:</strong> <span id="modalLocation"></span></li>
                    <li><strong>이메일:</strong> <span id="modalEmail"></span></li>
                    <li><strong>연락처:</strong> <span id="modalPhone"></span></li>
                    <li><strong>링크:</strong> <a id="modalLink" href="" target="_blank"></a></li>
                </ul>
            </div>
            <div class="modal-section">
                <h3>강점</h3>
                <ul id="modalStrengths" class="modal-strengths"></ul>
            </div>
            <div class="modal-section">
                <h3>스킬</h3>
                <div id="modalSkills" class="modal-skills"></div>
            </div>
            <div class="modal-footer">
                <a id="modalTilLink" href="" class="til-button">TIL 바로가기</a>
            </div>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
